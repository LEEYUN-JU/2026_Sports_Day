<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Festival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 언어 선택 버튼 -->
<div class="lang-btns">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('jp')">日本語</button>
  <button onclick="setLang('kr')">한국어</button>
</div>

<!-- 콘텐츠 -->
<div id="content">
  <!-- 영어 -->
  <div class="lang en">
    <h1>2026 Spring Sports Festival</h1>
    <p>Mobile-friendly web page for easy access.</p>
  </div>

  <!-- 일본어 -->
  <div class="lang jp">
    <h1>2026年 春季運動会</h1>
    <p>モバイルで簡単にアクセスできるウェブページです。</p>
  </div>

  <!-- 한국어 -->
  <div class="lang kr">
    <h1>2026년도 춘계 운동회</h1>
    <p>모바일에서 쉽게 접근 가능한 웹페이지입니다.</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
