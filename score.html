
<style>  
  

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
.wrap {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: #EAF6FB;
  padding: 12px 14px 14px;
  margin: 0 auto;
  border-radius: 16px;
}

/* 깃발 */
.bunting {
  display: flex;
  justify-content: center;
  margin-bottom: 7px;
}

.flag {
  width: 16px;
  height: 10px;
  margin: 0 2px;
  clip-path: polygon(0 0,100% 0,50% 100%);
}

/* 타이틀 */
.title-box {
  background: #fff;
  border-radius: 14px;
  text-align: center;
  padding: 8px 8px 7px;
  margin-bottom: 10px;
  border: 2px solid #B5D4F4;
}

.main-title {
  font-size: 50px;
  font-weight: 900;
  color: #3C3489;
  letter-spacing: 0.04em;
}

.main-title span {
  color: #378ADD;
}

.sub {
  font-size: 11px;
  font-weight: 700;
  color: #185FA5;
  background: #E6F1FB;
  border-radius: 20px;
  padding: 3px 12px;
  display: inline-block;
  margin-top: 4px;
}

/* 그리드 */
.main-layout {
  display: grid;
  grid-template-columns: 1fr; /* 왼쪽 + 오른쪽 */
  gap: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: 1fr;
  grid-auto-rows: 1fr;  /* ← 이것만 추가 */
  gap: 7px;  
}

.grid-wide,
.grid-bottom {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
  margin-top: 7px;
}

.grid-left {
  grid-row: 1 / span auto; /* 🔥 핵심 */
}

.grid-right {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.score{
  margin-left: 5px; 
  font-weight: 900; 
  font-size: 18;
}

/* 카드 */
.card {
  background: #fff;
  border-radius: 12px;
  border: 1.5px solid #D8EEF9;
  overflow: hidden;
  height: 100%;
}
.card:hover{border-color:#85B7EB;}
.card-head {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px 5px;
  border-bottom: 1px dashed #D8EEF9;
}

.ev-num{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.ev-title {
  font-size: 18px;
  font-weight: 900;
}
.score-chip{font-size:10px;font-weight:700;background:#EEEDFE;color:#3C3489;border-radius:4px;padding:1px 5px;white-space:nowrap;}
 .all-member{
    display:inline-block;font-size:10px;font-weight:700;
    background:#fdedfe;color:#df1bbe;
    border-radius:4px;padding:1px 5px;
    margin-left:1px;vertical-align:middle;
  }
.all-badge{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:10px;background:#EAF3DE;color:#3B6D11;border:1px solid #97C459;margin-left:auto;}

.card-body{padding:6px 8px 7px;}
.role-section{margin-bottom:5px;}
.role-section:last-child{margin-bottom:0;}
.role-label{font-size:10px;font-weight:700;color:#fff;border-radius:5px;padding:1.5px 6px;display:inline-block;margin-bottom:3px;}
.rl-p{background:#E24B4A;}
.rl-w{background:#d3cece;}
.rl-r{background:#378ADD;}
.rl-s{background:#BA7517;}
.rl-g{background:#7bba17;}
.rl-u{background:#3C3489;}
.slots{display:flex;flex-direction:column;gap:3px;}
.slots.r{display:flex;flex-direction:row;gap:3px;}

.slot{font-size:9.5px;font-weight:700;
  background:#F1EFE8;
  border-radius:6px;
  padding:3px 7px;color:#444441;
  border:1px dashed #B4B2A9;min-height:33px;display:flex;
  align-items:center;}

.slot.filled{background:#FCEBEB;color:#791F1F;border:1px solid #F09595;}
.slot.filled-b{background:#E6F1FB;color:#0C447C;border:1px solid #85B7EB;}

.slot-num{font-size:15px;font-weight:900;background:#E24B4A;color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;margin-right:4px;flex-shrink:0;}
.slot-num.b{background:#378ADD;}
.slot-num.w{background:#d3cece;}
.slot-num.g{background:#7bba17;}
.slot-num.gold{font-size: 23px; font-weight: 900; width:28px;height:28px; background-color: gold;}
.slot-num.silver{font-size: 23px; font-weight: 900; width:28px;height:28px; background-color: silver;}
.slot-num.brown{font-size: 23px; font-weight: 900; width:28px;height:28px; background-color: brown;}

.pair-slot{font-size:9px;font-weight:700;background:#EAF3DE;color:#27500A;border:1px solid #97C459;
  border-radius:6px;padding:3px 7px;min-height:22px;display:flex;align-items:center;}

.obs-grid{display:grid;grid-template-columns:1fr; gap:3px;margin-top:3px;}
.obs-item{font-size:12px;color:#5F5E5A;background:#F1EFE8;border-radius:5px;padding:2px 6px;display:flex;align-items:center;gap:3px;}
.obs-n{font-size:13px;font-weight:900;color:#854F0B;}

.all-note{font-size:9.5px;color:#5F5E5A;padding:4px 2px;line-height:1.5;}

.footer{margin-top:9px;background:#fff;border-radius:10px;border:1.5px dashed #85B7EB;padding:5px 10px;display:flex;gap:8px;align-items:center;}
.team-r{background:#FCEBEB;color:#A32D2D;font-weight:700;padding:3px 8px;border-radius:6px;font-size:10px;border:1px solid #F09595;}
.team-w{background:#F1EFE8;color:#444441;font-weight:700;padding:3px 8px;border-radius:6px;font-size:10px;border:1px solid #B4B2A9;}
.team-r.big{background:#FCEBEB;color:#A32D2D;font-weight:700;padding:3px 8px;border-radius:6px;font-size:15px;border:1px solid #F09595;}
.team-w.big{background:#F1EFE8;color:#444441;font-weight:700;padding:3px 8px;border-radius:6px;font-size:15px;border:1px solid #B4B2A9;}

.note{font-size:9px;color:#888780;margin-left:auto;justify-content: flex-end;}

.back-btn {
  display: none;
}

@media (max-width: 768px) {
  .wrap {
    flex-direction: row; /* 2열 → 1열 */
  }

  .wrap {
    padding: 10px 8px;
  }

  .ev-name {
    font-size: 15px;
  }
  .ev-note {
    font-size: 12px;
  }
  .ev-title {
  font-size: 15x;
  font-weight: 900;
  }

  .main-title {
    font-size: 30px;
    color: #3C3489;
  }

  .main-title .big {
    font-size: 20px;
    color: darkgray;
  }

  .main-title .small {
    font-size: 8px;
    color: rgb(167, 44, 44);
  }

  .main-layout {
    grid-template-columns: 1fr; /* ✅ 한 줄 */
    gap: 10px;
  }

  .grid {
    grid-template-columns: 1fr;
    grid-auto-rows: auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1.5px solid #D8EEF9;
    overflow: hidden;
  }

  .grid-right {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .back-btn {
    display: block;
    position: fixed;
    top: 16px;
    left: 16px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    cursor: pointer;
  }

  }
</style>
