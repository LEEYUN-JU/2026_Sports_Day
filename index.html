<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春の大運動会</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    p.date { color: #888; font-size: 14px; margin-bottom: 2rem; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 480px; }
    .card { background: white; border-radius: 16px; border: 1px solid #e0e0e0; padding: 2rem 1rem; text-align: center; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: box-shadow 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .label { font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>春の大運動会</h1>
  <p class="date">Sports Day 2025</p>
  <div class="grid">
    <a class="card" href="schedule.html">
      <div class="icon" style="background:#E6F1FB;">📅</div>
      <span class="label">スケジュール</span>
    </a>
    <a class="card" href="score.html">
      <div class="icon" style="background:#EAF3DE;">🏆</div>
      <span class="label">スコア</span>
    </a>
    <a class="card" href="white.html">
      <div class="icon" style="background:#F1EFE8;">⬜</div>
      <span class="label">白　チーム</span>
    </a>
    <a class="card" href="red.html">
      <div class="icon" style="background:#FCEBEB;">🟥</div>
      <span class="label">紅　チーム</span>
    </a>    
  </div>
</body>
</html>
